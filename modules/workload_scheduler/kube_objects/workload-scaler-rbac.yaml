apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaler-sa
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scaler-role
rules:
# Read workloads
- apiGroups: ["apps"]
  resources:
    - deployments
    - statefulsets
  verbs: ["get", "list", "watch", "patch", "update"]

# Scale workloads
- apiGroups: ["apps"]
  resources:
    - deployments/scale
    - statefulsets/scale
  verbs: ["get", "update", "patch"]

# Read namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]

# Read pods (no delete needed anymore)
- apiGroups: [""]
  resources:
    - pods
  verbs: ["get", "list", "watch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scaler-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scaler-role
subjects:
- kind: ServiceAccount
  name: scaler-sa
  namespace: ${NAMESPACE}