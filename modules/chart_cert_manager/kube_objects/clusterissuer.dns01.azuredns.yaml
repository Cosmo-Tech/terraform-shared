apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${CERTIFICATE_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        azureDNS:
          hostedZoneName: ${DOMAIN_ZONE}                  # your DNS zone
          resourceGroupName: ${DOMAIN_ZONE_RESOURCE_GROUP}            # Azure Resource Group containing the zone
          subscriptionID: ${SUBSCRIPTION_ID}
          tenantID: ${TENANT_ID}
          clientID: ${CLIENT_ID}
          clientSecretSecretRef:
            name: dns-challenge                           # this secret is being created from terraform-onprem
            key: client-secret
          podTemplate:
            metadata:
              labels:
                networking/traffic-allowed: "yes"     
            spec:
              tolerations:
              - key: "vendor"
                operator: "Equal"
                value: "cosmotech"
                effect: "NoSchedule"
              nodeSelector:
                "cosmotech.com/tier": "services"
              imagePullSecrets:
                - name: ${IMAGE_REGISTRY_AUTH_SECRET}
