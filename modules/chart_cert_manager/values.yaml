installCRDs: true

nodeSelector:
  cosmotech.com/tier: services
tolerations:
  - key: "vendor"
    operator: "Equal"
    value: "cosmotech"
    effect: "NoSchedule"
  - key: "cosmotech.com/tier"
    operator: "Equal"
    value: "services"
    effect: "NoSchedule"
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
serviceAccount:
  create: false
  annotations: |
    ${SERVICE_ANNOTATIONS}

cainjector:
  podLabels:
    networking/traffic-allowed: "yes"
  nodeSelector:
    cosmotech.com/tier: services
  tolerations:
    - key: "vendor"
      operator: "Equal"
      value: "cosmotech"
      effect: "NoSchedule"
    - key: "cosmotech.com/tier"
      operator: "Equal"
      value: "services"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  image:
    repository: cosmotech/cert-manager-cainjector-iamguarded
    pullPolicy: IfNotPresent

controller:
  podLabels:
    networking/traffic-allowed: "yes"
  nodeSelector:
    cosmotech.com/tier: services
  tolerations:
    - key: "vendor"
      operator: "Equal"
      value: "cosmotech"
      effect: "NoSchedule"
    - key: "cosmotech.com/tier"
      operator: "Equal"
      value: "services"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  image:
    repository: cosmotech/cert-manager-controller-iamguarded
    pullPolicy: IfNotPresent
  acmesolver:
    image:
      repository: cosmotech/cert-manager-acmesolver-iamguarded
      pullPolicy: IfNotPresent

webhook:
  podLabels:
    networking/traffic-allowed: "yes"
  nodeSelector:
    cosmotech.com/tier: services
  tolerations:
    - key: "vendor"
      operator: "Equal"
      value: "cosmotech"
      effect: "NoSchedule"
    - key: "cosmotech.com/tier"
      operator: "Equal"
      value: "services"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  image:
    repository: cosmotech/cert-manager-webhook-iamguarded
    pullPolicy: IfNotPresent

startupapicheck:
  nodeSelector:
    cosmotech.com/tier: services
  tolerations:
    - key: "vendor"
      operator: "Equal"
      value: "cosmotech"
      effect: "NoSchedule"
    - key: "cosmotech.com/tier"
      operator: "Equal"
      value: "services"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

global:
  imageRegistry: ${IMAGE_REGISTRY}
  imagePullSecrets:
    - name: ${IMAGE_REGISTRY_AUTH_SECRET}
