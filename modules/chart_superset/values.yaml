auth:
  enabled: true
  username: admin
  existingSecret: "${SUPERSET_SECRET_NAME}"

beat:
  enabled: false

defaultInitContainers:
  waitForDB:
    enabled: true
    resourcesPreset: nano
  waitForRedis:
    enabled: true
    resourcesPreset: nano

existingConfigmap: "${CONFIGMAP_NAME}"

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/hsts: "false"
    ## Define timeout to allow long-running queries
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "${SUPERSET_CONNECT_TIMEOUT}"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "${SUPERSET_QUERY_TIMEOUT}"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "${SUPERSET_QUERY_TIMEOUT}"
    ## Define body sizes for large data file exchanges.
    nginx.ingress.kubernetes.io/client_max_body_size: "${SUPERSET_MAX_FILE_SIZE}"
    nginx.ingress.kubernetes.io/proxy-body-size: "${SUPERSET_MAX_FILE_SIZE}"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "${SUPERSET_BUFFER_SIZE}"
  extraTls:
  - hosts:
      - "${SUPERSET_CLUSTER_DOMAIN}"
    secretName: letsencrypt-prod
  path: /
  pathType: Prefix
  hostname: "${SUPERSET_CLUSTER_DOMAIN}"
  ingressClassName: nginx
  selfSigned: false


